name: iOS Build & TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    env:
      ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Fix Package.swift paths (Windows → POSIX)
        run: |
          sed -i '' 's|\\\\|/|g' ios/App/CapApp-SPM/Package.swift
          echo "Package.swift after fix:"
          cat ios/App/CapApp-SPM/Package.swift

      - name: Setup App Store Connect API key file
        run: |
          mkdir -p $HOME/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode \
            > $HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          chmod 600 $HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          echo "Key file: $(ls -lh $HOME/.appstoreconnect/private_keys/)"

      - name: Prepare TestFlight API key input
        id: tf-key
        env:
          ASC_API_KEY_RAW: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          if [ -n "$ASC_API_KEY_RAW" ]; then
            {
              echo "api_private_key<<EOF"
              echo "$ASC_API_KEY_RAW"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "api_private_key<<EOF"
              cat "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Install Distribution certificate to keychain
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH=$RUNNER_TEMP/cert.p12

          # 인증서 디코드
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          # 임시 키체인 생성 및 활성화
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 인증서 임포트 (codesign 접근 허용)
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 검색 목록에 임시 키체인 추가 (기존 키체인 유지)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)

          echo "Installed signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # App Store 배포 프로비저닝 프로파일 설치
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          PROFILE_PATH="$PROFILE_DIR/f1ac67d7-191f-48de-9996-c68909d39dcd.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          echo "Installed provisioning profile:"
          ls -la "$PROFILE_DIR"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "PROFILE_PATH=$PROFILE_PATH" >> "$GITHUB_ENV"

      - name: Xcode signing diagnostics
        run: |
          mkdir -p $GITHUB_WORKSPACE/build
          echo "Xcode version:"
          xcodebuild -version | tee $GITHUB_WORKSPACE/build/xcode-version.log
          echo "Signing identities on runner:"
          security find-identity -v -p codesigning | tee $GITHUB_WORKSPACE/build/signing-identities.log || true
          echo "Resolved build settings (bundle/team/signing):"
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -showBuildSettings | tee $GITHUB_WORKSPACE/build/build-settings.log

      - name: Archive (auto signing)
        id: archive
        continue-on-error: true
        run: |
          mkdir -p $GITHUB_WORKSPACE/build
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $GITHUB_WORKSPACE/build/App.xcarchive \
            -resultBundlePath $GITHUB_WORKSPACE/build/ArchiveResult.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive 2>&1 | tee $GITHUB_WORKSPACE/build-archive.log
          exit ${PIPESTATUS[0]}

      - name: Export IPA
        id: export
        if: steps.archive.outcome == 'success'
        continue-on-error: true
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.tadaktadak.app</key>
              <string>tadaktadak App Store</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/build/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $GITHUB_WORKSPACE/build/output \
            -resultBundlePath $GITHUB_WORKSPACE/build/ExportResult.xcresult 2>&1 | tee $GITHUB_WORKSPACE/build-export.log
          exit ${PIPESTATUS[0]}

      - name: Locate exported IPA
        if: steps.export.outcome == 'success'
        run: |
          echo "build/output 디렉토리 내용:"
          ls -la $GITHUB_WORKSPACE/build/output/ || true
          IPA_PATH=$(ls $GITHUB_WORKSPACE/build/output/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "build/output에 IPA 없음 — build 전체에서 검색:"
            IPA_PATH=$(find $GITHUB_WORKSPACE/build -name "*.ipa" | head -1)
          fi
          if [ -z "$IPA_PATH" ]; then
            echo "IPA를 찾지 못했습니다."
            exit 1
          fi
          echo "찾은 IPA: $IPA_PATH"
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload to TestFlight
        if: steps.export.outcome == 'success'
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ steps.tf-key.outputs.api_private_key }}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            ${{ github.workspace }}/build-archive.log
            ${{ github.workspace }}/build-export.log
            ${{ github.workspace }}/build/xcode-version.log
            ${{ github.workspace }}/build/signing-identities.log
            ${{ github.workspace }}/build/build-settings.log
            ${{ github.workspace }}/build/ArchiveResult.xcresult/**
            ${{ github.workspace }}/build/ExportResult.xcresult/**
          if-no-files-found: ignore
          retention-days: 3

      - name: Fail when archive/export failed
        if: steps.archive.outcome != 'success' || steps.export.outcome != 'success'
        run: |
          echo "archive outcome: ${{ steps.archive.outcome }}"
          echo "export outcome: ${{ steps.export.outcome }}"
          echo "Check build-logs artifact for detailed diagnostics."
          exit 1

      - name: Upload IPA to Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.sha }}
          path: ${{ github.workspace }}/build/output/*.ipa
          if-no-files-found: warn
          retention-days: 7

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
            echo "Deleted temporary keychain: $KEYCHAIN_PATH"
          else
            echo "No temporary keychain to delete."
          fi
          if [ -n "$PROFILE_PATH" ] && [ -f "$PROFILE_PATH" ]; then
            rm -f "$PROFILE_PATH"
            echo "Deleted provisioning profile: $PROFILE_PATH"
          fi
