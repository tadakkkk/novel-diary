name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OUTPUT_PATH: ${{ github.workspace }}/build/output

jobs:
  build:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      # ── 출력 디렉토리 생성 ──────────────────────────────────────────────────
      - name: Prepare output directory
        run: mkdir -p $GITHUB_WORKSPACE/build/output

      # ── 서명 설정 ───────────────────────────────────────────────────────────
      - name: Setup signing
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      # ── 서명 있는 빌드 ──────────────────────────────────────────────────────
      - name: Build (signed)
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $GITHUB_WORKSPACE/build/App.xcarchive \
            -quiet \
            archive

      # ── 서명 없는 빌드 ──────────────────────────────────────────────────────
      - name: Build (unsigned)
        if: ${{ env.APPLE_CERTIFICATE == '' }}
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $GITHUB_WORKSPACE/build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet \
            archive

      # ── 서명된 IPA export ──────────────────────────────────────────────────
      - name: Export signed IPA
        if: ${{ env.APPLE_TEAM_ID != '' }}
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/build/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $GITHUB_WORKSPACE/build/output

      # ── unsigned IPA 패키징 ─────────────────────────────────────────────────
      - name: Package unsigned IPA
        if: ${{ env.APPLE_TEAM_ID == '' }}
        run: |
          APP=$(find $GITHUB_WORKSPACE/build/App.xcarchive/Products/Applications -name "*.app" | head -1)
          mkdir -p $GITHUB_WORKSPACE/build/output/Payload
          cp -r "$APP" $GITHUB_WORKSPACE/build/output/Payload/
          cd $GITHUB_WORKSPACE/build/output && zip -r App-unsigned.ipa Payload/
          rm -rf $GITHUB_WORKSPACE/build/output/Payload

      # ── .ipa 확인 ──────────────────────────────────────────────────────────
      - name: Verify IPA
        run: |
          echo "=== IPA search in $GITHUB_WORKSPACE/build ==="
          find $GITHUB_WORKSPACE/build -name "*.ipa" 2>/dev/null

          IPA=$(find $GITHUB_WORKSPACE/build/output -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "ERROR: .ipa not found in $GITHUB_WORKSPACE/build/output"
            exit 1
          fi
          echo "IPA verified: $IPA"
          ls -lh "$IPA"

      # ── TestFlight 업로드 ──────────────────────────────────────────────────
      - name: Upload to TestFlight
        run: |
          IPA=$(find $GITHUB_WORKSPACE/build/output -name "*.ipa" | head -1)
          echo "=== TestFlight Upload Start ==="
          echo "IPA      : $IPA"
          echo "Key ID   : $ASC_API_KEY_ID"
          echo "Issuer ID: $ASC_API_ISSUER_ID"

          if [ ! -f "$IPA" ]; then
            echo "ERROR: IPA not found"
            exit 1
          fi

          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" \
            --verbose 2>&1

          UPLOAD_EXIT=$?
          if [ $UPLOAD_EXIT -eq 0 ]; then
            echo "=== SUCCESS: TestFlight upload completed ==="
          else
            echo "=== FAILED: TestFlight upload failed (exit $UPLOAD_EXIT) ==="
            exit $UPLOAD_EXIT
          fi

      # ── GitHub Artifacts 업로드 ────────────────────────────────────────────
      - name: Upload IPA to Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.sha }}
          path: ${{ github.workspace }}/build/output/*.ipa
          if-no-files-found: warn
          retention-days: 7
