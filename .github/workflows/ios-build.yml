name: iOS Build & TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    env:
      ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Fix Package.swift paths (Windows → POSIX)
        run: |
          sed -i '' 's|\\\\|/|g' ios/App/CapApp-SPM/Package.swift
          echo "Package.swift after fix:"
          cat ios/App/CapApp-SPM/Package.swift

      - name: Setup App Store Connect API key file
        run: |
          mkdir -p $HOME/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode \
            > $HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          chmod 600 $HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          echo "Key file: $(ls -lh $HOME/.appstoreconnect/private_keys/)"

      - name: Prepare TestFlight API key input
        id: tf-key
        env:
          ASC_API_KEY_RAW: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          if [ -n "$ASC_API_KEY_RAW" ]; then
            {
              echo "api_private_key<<EOF"
              echo "$ASC_API_KEY_RAW"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "api_private_key<<EOF"
              cat "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Archive (auto signing)
        run: |
          mkdir -p $GITHUB_WORKSPACE/build
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $GITHUB_WORKSPACE/build/App.xcarchive \
            -resultBundlePath $GITHUB_WORKSPACE/build/ArchiveResult.xcresult \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -allowProvisioningUpdates \
            -authenticationKeyPath $HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8 \
            -authenticationKeyID $ASC_API_KEY_ID \
            -authenticationKeyIssuerID $ASC_API_ISSUER_ID \
            archive 2>&1 | tee $GITHUB_WORKSPACE/build-archive.log
          exit ${PIPESTATUS[0]}

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/build/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $GITHUB_WORKSPACE/build/output \
            -resultBundlePath $GITHUB_WORKSPACE/build/ExportResult.xcresult \
            -allowProvisioningUpdates \
            -authenticationKeyPath $HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8 \
            -authenticationKeyID $ASC_API_KEY_ID \
            -authenticationKeyIssuerID $ASC_API_ISSUER_ID 2>&1 | tee $GITHUB_WORKSPACE/build-export.log
          exit ${PIPESTATUS[0]}

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ github.workspace }}/build/output/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ steps.tf-key.outputs.api_private_key }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            ${{ github.workspace }}/build-archive.log
            ${{ github.workspace }}/build-export.log
            ${{ github.workspace }}/build/ArchiveResult.xcresult/**
            ${{ github.workspace }}/build/ExportResult.xcresult/**
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload IPA to Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.sha }}
          path: ${{ github.workspace }}/build/output/*.ipa
          if-no-files-found: warn
          retention-days: 7
