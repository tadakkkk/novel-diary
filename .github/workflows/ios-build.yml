name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      # ── 서명 설정 (Apple Developer 계정 있을 때만) ──────────────────────────
      - name: Setup signing
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      # ── 서명 있는 빌드 (TestFlight 업로드용) ───────────────────────────────
      - name: Build (signed)
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath ${{ runner.temp }}/App.xcarchive \
            -quiet \
            archive

      # ── 서명 없는 빌드 (개발/확인용) ───────────────────────────────────────
      - name: Build (unsigned)
        if: ${{ env.APPLE_CERTIFICATE == '' }}
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath ${{ runner.temp }}/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet \
            archive

      # ── 서명된 IPA export ──────────────────────────────────────────────────
      - name: Export signed IPA
        if: ${{ env.APPLE_TEAM_ID != '' }}
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath ${{ runner.temp }}/ipa

      # ── unsigned IPA 패키징 (Apple Developer 계정 없을 때 artifact용) ──────
      - name: Package unsigned IPA
        if: ${{ env.APPLE_TEAM_ID == '' }}
        run: |
          APP=$(find ${{ runner.temp }}/App.xcarchive/Products/Applications -name "*.app" | head -1)
          mkdir -p ${{ runner.temp }}/ipa/Payload
          cp -r "$APP" ${{ runner.temp }}/ipa/Payload/
          cd ${{ runner.temp }}/ipa && zip -r App-unsigned.ipa Payload/
          echo "Unsigned IPA: ${{ runner.temp }}/ipa/App-unsigned.ipa"

      # ── .ipa 실제 경로 탐색 ────────────────────────────────────────────────
      - name: Find IPA
        run: |
          echo "=== Searching for .ipa files ==="
          echo "-- runner.temp --"
          find ${{ runner.temp }} -name "*.ipa" 2>/dev/null || true
          echo "-- /Users/runner/work --"
          find /Users/runner/work -name "*.ipa" 2>/dev/null || true

          IPA=$(find ${{ runner.temp }} -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then
            IPA=$(find /Users/runner/work -name "*.ipa" 2>/dev/null | head -1)
          fi

          if [ -z "$IPA" ]; then
            echo "ERROR: .ipa file not found anywhere"
            exit 1
          fi

          echo "IPA found: $IPA"
          ls -lh "$IPA"
          echo "IPA_PATH=$IPA" >> $GITHUB_ENV

      # ── TestFlight 업로드 ──────────────────────────────────────────────────
      - name: Upload to TestFlight
        run: |
          echo "=== TestFlight Upload Start ==="
          echo "IPA_PATH : $IPA_PATH"
          echo "API Key ID: $ASC_API_KEY_ID"
          echo "Issuer ID : $ASC_API_ISSUER_ID"

          if [ ! -f "$IPA_PATH" ]; then
            echo "ERROR: IPA not found at $IPA_PATH"
            exit 1
          fi

          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          echo "API key file written."

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" \
            --verbose 2>&1

          UPLOAD_EXIT=$?
          if [ $UPLOAD_EXIT -eq 0 ]; then
            echo "=== SUCCESS: TestFlight upload completed ==="
          else
            echo "=== FAILED: TestFlight upload failed (exit $UPLOAD_EXIT) ==="
            exit $UPLOAD_EXIT
          fi

      # ── GitHub Artifacts 업로드 ────────────────────────────────────────────
      - name: Upload IPA to Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.sha }}
          path: ${{ env.IPA_PATH }}
          if-no-files-found: warn
          retention-days: 7
